version: "3.9"

services:
  # ── TimescaleDB ─────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trademan-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: trademan
      POSTGRES_PASSWORD: trademan_pass
      POSTGRES_DB: trademan
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trademan -d trademan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trademan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trademan-backend
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://trademan:trademan_pass@timescaledb:5432/trademan
      REDIS_URL: redis://redis:6379/0
      BROKER_ADAPTER: mock
      # OpenAlgo runs on the host machine — use host.docker.internal
      OPENALGO_HOST: host.docker.internal:5000
      OPENALGO_WS_HOST: host.docker.internal:8765
      OPENALGO_API_KEY: ""
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      DEBUG: "true"
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trademan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  timescaledb_data:
  redis_data:
